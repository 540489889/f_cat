workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chongloutech.lehui"
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: iOS Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          # 写入导出选项（注意：XML 不能有前导空格）
          cat > ios/ExportOptions.plist << 'PLEOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>method</key>
	<string>development</string>
	<key>teamID</key>
	<string>6P3CLQT9PD</string>
	<key>provisioningProfiles</key>
	<dict>
		<key>com.chongloutech.lehui</key>
		<string>cesi</string>
	</dict>
	<key>signingStyle</key>
	<string>manual</string>
	<key>compileBitcode</key>
	<false/>
</dict>
</plist>
PLEOF

          # 用 flutter build ipa + 自定义 ExportOptions.plist（不走 --export-method）
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

          # 复制 IPA 产物到固定的 artifacts 路径
          cd build/ios/ipa && IPA_FILE=$(ls *.ipa 2>/dev/null | head -1) && [ -n "$IPA_FILE" ] && cp "$IPA_FILE" cat.ipa && echo "IPA ready: cat.ipa"
    artifacts:
      - build/ios/ipa/cat.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com