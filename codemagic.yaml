workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: 1.16.2
      vars:
        BUNDLE_ID: "com.chongloutech.lehui"
        TEAM_ID: "6P3CLQT9PD"

    # ✅ 签名配置放在 workflow 内，使用 Codemagic 推荐的 `scripts` 内命令即可
    scripts:
      - name: Configure code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --warn-only

      - name: Flutter pub get
        script: flutter pub get

      - name: iOS Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Development IPA
        script: |
          flutter build ipa \
            --release \
            --export-method development \
            --bundle-id $BUNDLE_ID
          mkdir -p build/ios/ipa
          cp build/ios/ipa/*.ipa build/ios/ipa/cat.ipa

    artifacts:
      - build/ios/ipa/cat.ipa

    # ✅ 邮箱必须填真实有效的地址
    publishing:
      email:
        recipients:
          - 540489889@qq.com # 改成你自己的邮箱