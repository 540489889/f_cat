workflows:
  default-workflow:
    name: iOS Release Build
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - profile_1: "cesi.mobileprovision"
        certificates:
          - certificate_1: "2f3dbcc5c10f45d9a576b029afe6ed63.p12"
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/ipa/*.ipa
