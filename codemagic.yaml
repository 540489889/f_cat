workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chongloutech.lehui"
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: iOS Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          # --- Release 构建（ExportOptions.plist 已在仓库 ios/ 目录下）---
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

          # --- 复制 IPA 到 artifacts 路径 ---
          mkdir -p build/ios/ipa
          cp build/ios/ipa/*.ipa build/ios/ipa/cat.ipa 2>/dev/null || echo "IPA copied"
    artifacts:
      - build/ios/ipa/cat.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com