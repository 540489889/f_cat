workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    code_signing:
      signing_profiles:
        ios:
          bundle_id: com.chongloutech.lehui
          profile_type: iOS Development

    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: 1.16.2
      vars:
        BUNDLE_ID: "com.chongloutech.lehui"
        TEAM_ID: "6P3CLQT9PD"

    scripts:
      - name: Configure code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
          xcode-project set-team-id $TEAM_ID

      - name: Flutter pub get
        script: flutter pub get

      - name: iOS Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Development IPA
        script: |
          flutter build ipa \
            --release \
            --export-method development \
            --bundle-id $BUNDLE_ID
          mkdir -p build/ios/ipa
          cp build/ios/ipa/*.ipa build/ios/ipa/cat.ipa

    artifacts:
      - build/ios/ipa/cat.ipa

    publishing:
      email:
        recipients:
          - 此处改成你自己的接收邮箱