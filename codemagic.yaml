workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chongloutech.lehui"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          echo "=== Debug: listing available profiles ==="
          find /Users/builder -name "*.mobileprovision" 2>/dev/null || echo "No .mobileprovision files found"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory yet"
          echo "=== Installing profiles ==="
          xcode-project use-profiles
          echo "=== After install ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "Still no profiles directory"
      - name: Flutter pub get
        script: flutter pub get
      - name: iOS Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Build iOS IPA
        script: |
          flutter build ipa --release
          mkdir -p build/ios/ipa
          cp build/ios/ipa/*.ipa build/ios/ipa/cat.ipa 2>/dev/null || echo "IPA copied"
    artifacts:
      - build/ios/ipa/cat.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com
