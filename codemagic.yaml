workflows:
  default-workflow:
    name: iOS Release Build
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc  # 或 app_store
        bundle_identifier: com.chongloutech.lehui
        provisioning_profiles:
          - profile_1: "cesi.mobileprovision"  # 描述文件名
        certificates:
          - certificate_1: "2f3dbcc5c10f45d9a576b029afe6ed63.p12"  # 证书文件名
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/ipa/*.ipa  # 添加 IPA 输出
   
