workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: 1.16.2
      vars:
        BUNDLE_ID: "com.chongloutech.lehui"
        TEAM_ID: "6P3CLQT9PD"

    # ✅ 签名配置放在 workflow 内，使用 Codemagic 推荐的 `scripts` 内命令即可
    scripts:
      - name: Configure code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --warn-only

      - name: Flutter pub get
        script: flutter pub get

      - name: iOS Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Development IPA
        script: |
          flutter build ipa \
            --release \
            --export-method development \
            --bundle-id $BUNDLE_ID
          mkdir -p build/ios/ipa
          cp build/ios/ipa/*.ipa build/ios/ipa/cat.ipa

    artifacts:
      - build/ios/ipa/cat.ipa

    # ✅ 邮箱必须填真实有效的地址
    publishing:
      email:
        recipients:
          - 540489889@qq.com # 改成你自己的邮箱

  # ============ Android 发布（Linux 实例，绕开 Windows strip bug） ============
  android-aab:
    name: Android Release AAB
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      # 在 Codemagic 后台「Android code signing」上传 zhichuang.keystore，
      # 并配置 ANDROID_KEYSTORE / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD 变量
      android_signing:
        - keystore_reference: $ANDROID_KEYSTORE
          keystore_password: $KEYSTORE_PASSWORD
          key_alias: $KEY_ALIAS
          key_password: $KEY_PASSWORD
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: 写入 key.properties（供自定义签名配置读取）
        script: |
          cat > android/key.properties <<'EOF'
          storeFile=$CM_KEYSTORE_PATH
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      # 如需 Shorebird OTA，把下一行换成：shorebird release android
      - name: Build App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - 540489889@qq.com