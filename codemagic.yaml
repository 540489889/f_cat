workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      vars:
        BUNDLE_ID: "com.chongloutech.lehui"
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: iOS Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles "ios/Runner.xcworkspace"
      - name: Build iOS IPA
        script: |
          cd ios
          # 先用 flutter 构建release产物
          cd ..
          flutter build ios --release --no-codesign
          cd ios
          # 用 xcodebuild 直接 archive（Release 配置）
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ../build/ios/Runner.xcarchive \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            PROVISIONING_PROFILE_SPECIFIER=cesi \
            DEVELOPMENT_TEAM=6P3CLQT9PD \
            archive
          # 导出 IPA
          mkdir -p build/ipa/Payload
          cp -R build/ios/Runner.xcarchive/Products/Applications/Runner.app build/ipa/Payload/
          cd build/ipa && zip -r cat.ipa Payload/
    artifacts:
      - build/ios/ipa/cat.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com