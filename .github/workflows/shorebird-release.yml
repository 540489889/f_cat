name: Shorebird Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - beta
          - alpha

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 'latest'

      - name: Fix tobias proguard
        run: |
          # 先执行 pub get 下载依赖
          flutter pub get
          # 修复 tobias 插件 consumer-proguard-rules.txt 中的 -dontshrink 问题
          TOBIAS_FILE=$(find ~/.pub-cache/hosted/pub.dev/tobias-* -name "consumer-proguard-rules.txt" 2>/dev/null | head -1)
          if [ -f "$TOBIAS_FILE" ]; then
            sed -i 's/-dontshrink/# -dontshrink (disabled)/' "$TOBIAS_FILE"
            echo "Fixed: $TOBIAS_FILE"
          fi

      - name: Build & Release
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release android --flutter-version=3.44.5
