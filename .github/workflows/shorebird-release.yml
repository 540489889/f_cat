name: Shorebird Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - beta
          - alpha

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 'latest'

      - name: Fix tobias consumer proguard
        run: |
          # tobias 插件的 consumer-proguard-rules.txt 包含 -dontshrink，
          # 这在 consumer proguard 中不允许，需要移除
          find ~/.pub-cache/hosted/pub.dev/tobias-* -name "consumer-proguard-rules.txt" -delete 2>/dev/null || true

      - name: Build & Release
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release android --flutter-version=3.44.5
